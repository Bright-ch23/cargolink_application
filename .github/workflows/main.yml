name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Find Flutter Folder
        id: find-flutter
        run: |
          # This finds the exact folder where pubspec.yaml lives
          FLUTTER_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
          echo "Found Flutter app in: $FLUTTER_DIR"
          echo "APP_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

      - name: Install Dependencies
        run: cd ${{ env.APP_DIR }} && flutter pub get
        
      - name: Build APK
        run: cd ${{ env.APP_DIR }} && flutter build apk --debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-debug.apk
